<div class="auth-page">
  <div class="auth-shell auth-shell-single">
    <div class="auth-card">
      <div class="auth-card-header">
        <span class="card-badge">Change Password</span>
        <h2>Şifrəni dəyiş</h2>
        <p>
          Cari şifrənizi və yeni şifrənizi daxil edərək hesab təhlükəsizliyini yeniləyin.
        </p>
      </div>

      <form class="auth-form" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="currentPassword">Cari şifrə</label>
          <div class="password-wrapper">
            <input
              id="currentPassword"
              [type]="showCurrentPassword ? 'text' : 'password'"
              name="currentPassword"
              [(ngModel)]="currentPassword"
              placeholder="Cari şifrənizi daxil edin"
              autocomplete="current-password" />

            <button
              type="button"
              class="toggle-password"
              (click)="toggleCurrentPassword()">
              {{ showCurrentPassword ? 'Gizlət' : 'Göstər' }}
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="newPassword">Yeni şifrə</label>
          <div class="password-wrapper">
            <input
              id="newPassword"
              [type]="showNewPassword ? 'text' : 'password'"
              name="newPassword"
              [(ngModel)]="newPassword"
              placeholder="Yeni şifrəni daxil edin"
              autocomplete="new-password" />

            <button
              type="button"
              class="toggle-password"
              (click)="toggleNewPassword()">
              {{ showNewPassword ? 'Gizlət' : 'Göstər' }}
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmNewPassword">Yeni şifrəni təsdiqlə</label>
          <div class="password-wrapper">
            <input
              id="confirmNewPassword"
              [type]="showConfirmPassword ? 'text' : 'password'"
              name="confirmNewPassword"
              [(ngModel)]="confirmNewPassword"
              placeholder="Yeni şifrəni yenidən daxil edin"
              autocomplete="new-password" />

            <button
              type="button"
              class="toggle-password"
              (click)="toggleConfirmPassword()">
              {{ showConfirmPassword ? 'Gizlət' : 'Göstər' }}
            </button>
          </div>
        </div>

        <div class="info-box" *ngIf="successMessage">
          {{ successMessage }}
        </div>

        <div class="error-box" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>

        <button class="primary-btn" type="submit" [disabled]="isLoading">
          <span *ngIf="!isLoading">Şifrəni dəyiş</span>
          <span *ngIf="isLoading">Yenilənir...</span>
        </button>
      </form>
    </div>
  </div>
</div>

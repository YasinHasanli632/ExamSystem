<div class="auth-page">
  <div class="auth-overlay"></div>

  <div class="auth-card">
    <div class="brand-badge">Exam System</div>

    <div class="auth-header">
      <h2>Şifrəni yenilə</h2>
      <p>İlk giriş üçün şifrənin yenilənməsi məcburidir.</p>
    </div>

    <form class="auth-form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="currentPassword">Cari şifrə</label>
        <div class="password-wrapper">
          <input
            id="currentPassword"
            [type]="showCurrentPassword ? 'text' : 'password'"
            name="currentPassword"
            [(ngModel)]="currentPassword"
            placeholder="Cari şifrəni daxil edin"
            autocomplete="current-password" />

          <button type="button" class="toggle-password" (click)="toggleCurrentPassword()">
            {{ showCurrentPassword ? 'Gizlət' : 'Göstər' }}
          </button>
        </div>
      </div>

      <div class="form-group">
        <label for="newPassword">Yeni şifrə</label>
        <div class="password-wrapper">
          <input
            id="newPassword"
            [type]="showNewPassword ? 'text' : 'password'"
            name="newPassword"
            [(ngModel)]="newPassword"
            placeholder="Yeni şifrəni daxil edin"
            autocomplete="new-password" />

          <button type="button" class="toggle-password" (click)="toggleNewPassword()">
            {{ showNewPassword ? 'Gizlət' : 'Göstər' }}
          </button>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmNewPassword">Yeni şifrəni təkrar et</label>
        <div class="password-wrapper">
          <input
            id="confirmNewPassword"
            [type]="showConfirmPassword ? 'text' : 'password'"
            name="confirmNewPassword"
            [(ngModel)]="confirmNewPassword"
            placeholder="Yeni şifrəni təkrar daxil edin"
            autocomplete="new-password" />

          <button type="button" class="toggle-password" (click)="toggleConfirmPassword()">
            {{ showConfirmPassword ? 'Gizlət' : 'Göstər' }}
          </button>
        </div>
      </div>

      <div class="success-box" *ngIf="successMessage">
        {{ successMessage }}
      </div>

      <div class="error-box" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button class="primary-btn" type="submit" [disabled]="isLoading">
        <span *ngIf="!isLoading">Yadda saxla</span>
        <span *ngIf="isLoading">Yenilənir...</span>
      </button>
    </form>
  </div>
</div>

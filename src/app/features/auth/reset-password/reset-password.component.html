<div class="auth-page">
  <div class="auth-shell auth-shell-single">
    <div class="auth-card">
      <div class="auth-card-header">
        <span class="card-badge">Reset Password</span>
        <h2>Yeni şifrə təyin et</h2>
        <p>
          Hesabınız üçün yeni şifrə yaradın. Güclü və təhlükəsiz şifrə seçin.
        </p>
      </div>

      <form class="auth-form" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="newPassword">Yeni şifrə</label>
          <div class="password-wrapper">
            <input
              id="newPassword"
              [type]="showNewPassword ? 'text' : 'password'"
              name="newPassword"
              [(ngModel)]="newPassword"
              placeholder="Yeni şifrəni daxil edin"
              autocomplete="new-password" />

            <button
              type="button"
              class="toggle-password"
              (click)="toggleNewPassword()">
              {{ showNewPassword ? 'Gizlət' : 'Göstər' }}
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmNewPassword">Şifrəni təsdiqlə</label>
          <div class="password-wrapper">
            <input
              id="confirmNewPassword"
              [type]="showConfirmPassword ? 'text' : 'password'"
              name="confirmNewPassword"
              [(ngModel)]="confirmNewPassword"
              placeholder="Şifrəni yenidən daxil edin"
              autocomplete="new-password" />

            <button
              type="button"
              class="toggle-password"
              (click)="toggleConfirmPassword()">
              {{ showConfirmPassword ? 'Gizlət' : 'Göstər' }}
            </button>
          </div>
        </div>

        <div class="info-box" *ngIf="successMessage">
          {{ successMessage }}
        </div>

        <div class="error-box" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>

        <button class="primary-btn" type="submit" [disabled]="isLoading">
          <span *ngIf="!isLoading">Şifrəni yenilə</span>
          <span *ngIf="isLoading">Yenilənir...</span>
        </button>
      </form>

      <div class="auth-footer">
        <a routerLink="/login" class="text-link">Giriş səhifəsinə qayıt</a>
      </div>
    </div>
  </div>
</div>

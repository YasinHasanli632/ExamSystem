<div class="auth-page">
  <div class="auth-overlay"></div>

  <div class="auth-card">
    <div class="brand-badge">Exam System</div>

    <div class="auth-header">
      <h2>Şifrəni unutdum</h2>
      <p>Email ünvanını daxil et, təsdiq kodu göndərək.</p>
    </div>

    <form class="auth-form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          name="email"
          [(ngModel)]="email"
          placeholder="Məsələn: user@gmail.com"
          autocomplete="email" />
      </div>

      <div class="success-box" *ngIf="successMessage">
        {{ successMessage }}
      </div>

      <div class="error-box" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button class="primary-btn" type="submit" [disabled]="isLoading">
        <span *ngIf="!isLoading">Kod göndər</span>
        <span *ngIf="isLoading">Göndərilir...</span>
      </button>
    </form>

    <div class="auth-footer">
      <a routerLink="/login" class="text-link">Giriş səhifəsinə qayıt</a>
    </div>
  </div>
</div>

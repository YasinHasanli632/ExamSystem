<div class="auth-page">
  <div class="auth-shell auth-shell-single">
    <div class="auth-card">
      <div class="auth-card-header">
        <span class="card-badge">Password Recovery</span>
        <h2>Şifrəni unutdum</h2>
        <p>
          Hesabınızla əlaqəli email ünvanını daxil edin. Sizə təsdiq kodu göndəriləcək.
        </p>
      </div>

      <form class="auth-form" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="email">Email ünvanı</label>
          <input
            id="email"
            type="email"
            name="email"
            [(ngModel)]="email"
            placeholder="Məsələn: admin@mail.com"
            autocomplete="email" />
        </div>

        <div class="info-box" *ngIf="successMessage">
          {{ successMessage }}
        </div>

        <div class="error-box" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>

        <button class="primary-btn" type="submit" [disabled]="isLoading">
          <span *ngIf="!isLoading">Kod göndər</span>
          <span *ngIf="isLoading">Göndərilir...</span>
        </button>
      </form>

      <div class="auth-footer">
        <a routerLink="/login" class="text-link">Giriş səhifəsinə qayıt</a>
      </div>
    </div>
  </div>
</div>

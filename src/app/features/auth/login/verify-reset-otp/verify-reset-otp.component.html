<div class="auth-page">
  <div class="auth-shell auth-shell-single">
    <div class="auth-card">
      <div class="auth-card-header">
        <span class="card-badge">Verification</span>
        <h2>Təsdiq kodunu yoxla</h2>
        <p>
          Email ünvanınıza göndərilən təsdiq kodunu daxil edin.
        </p>
      </div>

      <form class="auth-form" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="email">Email ünvanı</label>
          <input
            id="email"
            type="email"
            name="email"
            [(ngModel)]="email"
            placeholder="Email ünvanını daxil edin"
            autocomplete="email" />
        </div>

        <div class="form-group">
          <label for="otp">Təsdiq kodu</label>
          <input
            id="otp"
            type="text"
            name="otp"
            [(ngModel)]="otp"
            placeholder="6 rəqəmli kodu daxil edin"
            autocomplete="one-time-code" />
        </div>

        <div class="info-box" *ngIf="successMessage">
          {{ successMessage }}
        </div>

        <div class="error-box" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>

        <button class="primary-btn" type="submit" [disabled]="isLoading">
          <span *ngIf="!isLoading">Kodu təsdiqlə</span>
          <span *ngIf="isLoading">Yoxlanılır...</span>
        </button>

        <button
          type="button"
          class="secondary-btn"
          (click)="resendCode()"
          [disabled]="resendLoading">
          <span *ngIf="!resendLoading">Kodu yenidən göndər</span>
          <span *ngIf="resendLoading">Göndərilir...</span>
        </button>
      </form>

      <div class="auth-footer">
        <a routerLink="/forgot-password" class="text-link">Geri qayıt</a>
      </div>
    </div>
  </div>
</div>

<div class="auth-page">
  <div class="auth-overlay"></div>

  <div class="auth-card">
    <div class="brand-badge">Exam System</div>

    <div class="auth-header">
      <h2>OTP təsdiqi</h2>
      <p>{{ email }} ünvanına göndərilən 6 rəqəmli kodu daxil et.</p>
    </div>

    <form class="auth-form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="otp">Təsdiq kodu</label>
        <input
          id="otp"
          type="text"
          name="otp"
          [(ngModel)]="otp"
          maxlength="6"
          placeholder="Məsələn: 123456"
          autocomplete="one-time-code" />
      </div>

      <div class="success-box" *ngIf="successMessage">
        {{ successMessage }}
      </div>

      <div class="error-box" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button class="primary-btn" type="submit" [disabled]="isLoading">
        <span *ngIf="!isLoading">Kodu təsdiqlə</span>
        <span *ngIf="isLoading">Yoxlanılır...</span>
      </button>

      <button
        class="secondary-btn"
        type="button"
        [disabled]="resendLoading"
        (click)="resendCode()">
        <span *ngIf="!resendLoading">Kodu yenidən göndər</span>
        <span *ngIf="resendLoading">Göndərilir...</span>
      </button>
    </form>

    <div class="auth-footer">
      <a routerLink="/forgot-password" class="text-link">Emaili dəyiş</a>
    </div>
  </div>
</div>

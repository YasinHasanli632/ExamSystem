<div class="student-shell">
  <aside class="sidebar" [class.collapsed]="isCollapsed">
    <div class="sidebar-top">
      <div class="brand-row">
        <div class="brand-mark">S</div>

        <div class="brand-meta" *ngIf="!isCollapsed">
          <h2>Exam System</h2>
          <p>Student Panel</p>
        </div>

        <button class="sidebar-toggle" type="button" (click)="toggleSidebar()">
          {{ isCollapsed ? '→' : '←' }}
        </button>
      </div>
    </div>

    <div class="sidebar-scroll">
      <div class="workspace-card" *ngIf="!isCollapsed">
        <span class="workspace-label">Student Workspace</span>
        <strong>Davamiyyət, tapşırıq və imtahan axını</strong>
        <small>Şəxsi tələbə paneli aktivdir</small>
      </div>

      <nav class="menu-list">
        <a
          *ngFor="let item of menuItems"
          [routerLink]="item.route"
          class="menu-item"
          [class.active]="isActive(item.route)">
          <div class="menu-main">
            <span class="menu-icon">{{ item.icon }}</span>

            <span class="menu-text" *ngIf="!isCollapsed">
              {{ item.label }}
            </span>
          </div>

          <span class="menu-badge" *ngIf="!isCollapsed && item.badge">
            {{ item.badge }}
          </span>
        </a>
      </nav>
    </div>

    <div class="sidebar-bottom">
      <div class="user-panel" [class.compact]="isCollapsed">
        <div class="user-avatar">
          {{ currentUserName.charAt(0) }}
        </div>

        <div class="user-info" *ngIf="!isCollapsed">
          <strong>{{ currentUserName }}</strong>
          <span>{{ currentUserRole }}</span>
        </div>
      </div>
    </div>
  </aside>

  <main class="main-area">
    <header class="topbar">
      <div class="topbar-left">
        <div class="page-info">
          <h1>{{ pageTitle }}</h1>
          <p>{{ pageDescription }}</p>
        </div>
      </div>

      <div class="topbar-right">
        <div class="search-box">
          <span class="search-icon">⌕</span>
          <input
            type="text"
            name="studentSearch"
            [(ngModel)]="searchText"
            [ngModelOptions]="{ standalone: true }"
            placeholder="Panel daxilində axtarış..."
            autocomplete="off"
            autocapitalize="off"
            autocorrect="off"
            spellcheck="false" />
        </div>

        <button
          type="button"
          class="icon-btn notification-btn"
          (click)="goToNotifications()">
          🔔
          <span class="notification-count" *ngIf="unreadNotificationCount > 0">
            {{ unreadNotificationCount > 99 ? '99+' : unreadNotificationCount }}
          </span>
        </button>

        <button type="button" class="profile-btn" (click)="goToProfile()">
          <div class="profile-avatar">{{ currentUserName.charAt(0) }}</div>
          <div class="profile-meta">
            <strong>{{ currentUserName }}</strong>
            <span>{{ currentUserEmail }}</span>
          </div>
        </button>

        <button type="button" class="logout-btn" (click)="logout()">Çıxış</button>
      </div>
    </header>

    <section class="content-area">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>
